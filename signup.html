<!DOCTYPE html>
<html>

<head>
    <title>welcome to weebsite</title>
</head>

<body>
    <h1>Create Your Account</h1>
    <form action="/backend">
        <label for="firstname">FIRST NAME:</label>
        <input type="text" id="firstname" placeholder="Enter a FirstName">
        <br><br>
        <label for="name">LAST NAME:</label>
        <input type="text" id="lastname" placeholder="Enter a LastName">
        <br><br>
        <label for="email">EMAIL:</label>
        <input type="email" id="email" placeholder="Enter a Email">
        <br><br>
        <label for="password">PASSWORD:</label>
        <input type="password" id="password" placeholder="Enter a Password">
        <br><br>
        <input type="radio" name="gender" value="male">male
        <input type="radio" name="gender" value="female">female
        <br><br>
        <select name="country">
            <option>India</option>
            <option>USA</option>
            </select>
           
              <br><br>
            <input type="submit" value="submit">
            <p>already have you account?<a href="/login.html">login</a></p>


    </form>
</body>

</html>
